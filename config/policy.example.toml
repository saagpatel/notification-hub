[classifier]
urgent_keywords = [
  "verification fail",
  "approval needed",
  "database down",
]
normal_keywords = [
  "session complete",
  "merged to main",
  "ship it",
]
info_keywords = [
  "routine ping",
  "status update",
]

[suppression]
quiet_start_hour = 23
quiet_end_hour = 7
dedup_window_minutes = 30
max_push_per_hour = 5
max_slack_per_hour = 20
max_overflow_buffer = 500
max_quiet_queue = 200

[[noise.rules]]
source = "personal-ops"
project = "personal-ops"
title_contains = "approval expires soon"
body_contains = "approval expires soon: review or cancel"
level = "info"
window_minutes = 10

[[noise.rules]]
source = "personal-ops"
project = "personal-ops"
title_contains = "daemon started"
level = "info"
window_minutes = 10

[[noise.rules]]
source = "personal-ops"
project = "personal-ops"
title_contains = "system needs attention"
body_contains = "run personal-ops doctor"
window_minutes = 30

[[noise.rules]]
source = "personal-ops"
project = "mail"
title_contains = "approval requested"
body_contains = "test draft"
level = "urgent"
window_minutes = 30

[[noise.rules]]
source = "personal-ops"
project = "mail"
title_contains = "approval requested"
body_contains = "console reply needed"
level = "urgent"
window_minutes = 30

[[noise.rules]]
source = "personal-ops"
project = "mail"
title_contains = "send succeeded"
body_contains = "test draft"
level = "info"
window_minutes = 30

[[noise.rules]]
source = "personal-ops"
project = "mail"
title_contains = "send succeeded"
body_contains = "console reply needed"
level = "info"
window_minutes = 30

[[noise.rules]]
source = "personal-ops"
project = "mail"
title_contains = "draft ready"
body_contains = "console reply needed"
level = "info"
window_minutes = 30

[[noise.rules]]
source = "codex"
text_contains = "session complete"
level = "info"
window_minutes = 10

[[noise.rules]]
source = "notion-os"
title_contains = "external-signal-sync complete"
level = "info"
window_minutes = 10

[[noise.rules]]
source = "notion-os"
title_contains = "control-tower-sync complete"
level = "info"
window_minutes = 10

[retention]
enabled = true
interval_minutes = 60
max_events = 2000
keep_archives = 10

[[routing.rules]]
project = "notification-hub"
priority = 20
force_level = "normal"
disable_push = true
continue_matching = true

[[routing.rules]]
source = "bridge_watcher"
priority = 10
disable_slack = true

[[routing.rules]]
project_prefix = "notification-"
title_contains = "review"
body_contains = "verification"
disable_slack = true
